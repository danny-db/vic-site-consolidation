command:
  - opentelemetry-instrument
  - uvicorn
  - app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: LAKEBASE_SCHEMA
    description: "Postgres schema name"
    value: "dtp_hackathon"
  - name: OTEL_TRACES_SAMPLER
    description: "OpenTelemetry trace sampling strategy"
    value: "always_on"
