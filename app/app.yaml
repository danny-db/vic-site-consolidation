command:
  - uvicorn
  - app.app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_HOST
    description: "Databricks workspace hostname (auto-injected in Databricks Apps)"
  - name: DATABRICKS_TOKEN
    description: "Databricks access token (auto-injected in Databricks Apps)"
  - name: SQL_WAREHOUSE_HTTP_PATH
    description: "SQL Warehouse HTTP path (e.g., /sql/1.0/warehouses/abc123)"
  - name: UC_CATALOG
    description: "Unity Catalog name"
    default: "danny_catalog"
  - name: UC_SCHEMA
    description: "UC Schema name"
    default: "dtp_hackathon"
