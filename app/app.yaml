command:
  - uvicorn
  - app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: LAKEBASE_HOST
    description: "Lakebase Autoscaling endpoint host"
    value: "ep-icy-sound-e1pdqoh3.database.eastus2.azuredatabricks.net"
  - name: LAKEBASE_PORT
    description: "Lakebase Postgres port"
    value: "5432"
  - name: LAKEBASE_DATABASE
    description: "Lakebase database name"
    value: "vic_consolidation_db"
  - name: LAKEBASE_SCHEMA
    description: "Postgres schema name"
    value: "dtp_hackathon"
  - name: LAKEBASE_USER
    description: "Native Postgres role username"
    value: "vic_consolidation_app"
  - name: LAKEBASE_PASSWORD
    description: "Native Postgres role password"
    value: "REDACTED!"
