<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIC Site Consolidation Viewer</title>
    <script src="https://unpkg.com/deck.gl@9.0.16/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #map { width: 100vw; height: 100vh; }
        #controls {
            position: absolute; top: 10px; left: 10px; z-index: 1;
            background: rgba(255,255,255,0.95); border-radius: 8px;
            padding: 16px; width: 280px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-height: 90vh; overflow-y: auto;
        }
        h1 { font-size: 16px; margin-bottom: 12px; color: #1a1a2e; }
        .filter-group { margin-bottom: 10px; }
        .filter-group label { display: block; font-size: 11px; font-weight: 600; color: #666; margin-bottom: 3px; text-transform: uppercase; }
        select, input[type="number"] { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        input[type="range"] { width: 100%; margin-top: 4px; accent-color: #1a73e8; }
        .range-labels { display: flex; justify-content: space-between; font-size: 10px; color: #999; margin-top: 2px; }
        .range-value { font-size: 13px; font-weight: 600; color: #1a73e8; }
        button { width: 100%; padding: 8px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 8px; }
        button:hover { background: #1557b0; }
        .stats { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
        .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
        .stat-label { color: #666; }
        .stat-value { font-weight: 600; }
        #legend { margin-top: 12px; }
        .legend-item { display: flex; align-items: center; font-size: 11px; padding: 2px 0; }
        .legend-dot { width: 14px; height: 14px; border-radius: 2px; margin-right: 6px; flex-shrink: 0; }
        .checkbox-group { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .checkbox-group label { font-size: 12px; text-transform: none; font-weight: normal; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                   z-index: 3; background: white; padding: 24px 32px; border-radius: 8px;
                   box-shadow: 0 4px 16px rgba(0,0,0,0.2); font-size: 14px; text-align: center; }
        #loading .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #ddd;
                            border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite;
                            margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><span class="spinner"></span>Loading all parcels...</div>
    <div id="map"></div>
    <div id="controls">
        <h1>Site Consolidation Viewer</h1>

        <div class="filter-group">
            <label>Display Limit <span class="range-value" id="limitValue">All</span></label>
            <input type="range" id="limitSlider" min="1000" max="170000" step="1000" value="170000" />
            <div class="range-labels"><span>1,000</span><span>170,000 (All)</span></div>
        </div>
        <div class="filter-group">
            <label>Suitability Tier</label>
            <select id="tierFilter">
                <option value="">All Tiers</option>
                <option value="Tier 1 - Excellent">Tier 1 - Excellent</option>
                <option value="Tier 2 - Very Good">Tier 2 - Very Good</option>
                <option value="Tier 3 - Good">Tier 3 - Good</option>
                <option value="Tier 4 - Moderate">Tier 4 - Moderate</option>
                <option value="Tier 5 - Low">Tier 5 - Low</option>
            </select>
        </div>
        <div class="filter-group">
            <label>LGA</label>
            <select id="lgaFilter"><option value="">All LGAs</option></select>
        </div>
        <div class="filter-group">
            <label>Min Score</label>
            <input type="number" id="minScore" value="" placeholder="0" min="-100" max="200" />
        </div>
        <div class="filter-group">
            <div class="checkbox-group">
                <input type="checkbox" id="excludeGrowth" />
                <label for="excludeGrowth">Exclude growth-area LGAs</label>
            </div>
        </div>
        <button onclick="loadData()">Apply Filters</button>

        <div class="stats" id="statsPanel"></div>

        <div id="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#d7191c"></div>Tier 1 - Excellent</div>
            <div class="legend-item"><div class="legend-dot" style="background:#fdae61"></div>Tier 2 - Very Good</div>
            <div class="legend-item"><div class="legend-dot" style="background:#fee08b"></div>Tier 3 - Good</div>
            <div class="legend-item"><div class="legend-dot" style="background:#a6d96a"></div>Tier 4 - Moderate</div>
            <div class="legend-item"><div class="legend-dot" style="background:#1a9641"></div>Tier 5 - Low</div>
        </div>
    </div>

    <script>
        const TIER_COLORS = {
            'Tier 1 - Excellent': [215, 25, 28],
            'Tier 2 - Very Good': [253, 174, 97],
            'Tier 3 - Good': [254, 224, 139],
            'Tier 4 - Moderate': [166, 217, 106],
            'Tier 5 - Low': [26, 150, 65],
        };

        const TOTAL_PARCELS = 167948;
        let deckgl = null;
        let geojsonData = null;

        // Slider label update
        const limitSlider = document.getElementById('limitSlider');
        const limitValue = document.getElementById('limitValue');
        limitSlider.addEventListener('input', () => {
            const v = parseInt(limitSlider.value);
            limitValue.textContent = v >= TOTAL_PARCELS ? 'All' : v.toLocaleString();
        });

        async function loadData() {
            const tier = document.getElementById('tierFilter').value;
            const lga = document.getElementById('lgaFilter').value;
            const minScore = document.getElementById('minScore').value;
            const excludeGrowth = document.getElementById('excludeGrowth').checked;
            const limit = parseInt(limitSlider.value);

            const params = new URLSearchParams();
            if (tier) params.set('tier', tier);
            if (lga) params.set('lga', lga);
            if (minScore && parseInt(minScore) !== 0) params.set('min_score', minScore);
            if (excludeGrowth) params.set('exclude_growth_areas', 'true');
            params.set('limit', String(limit));

            const url = `/api/parcels/geojson?${params}`;

            try {
                const loading = document.getElementById('loading');
                loading.style.display = 'block';
                loading.innerHTML = `<span class="spinner"></span>Loading ${limit >= TOTAL_PARCELS ? 'all' : limit.toLocaleString()} parcels...`;

                const resp = await fetch(url);
                geojsonData = await resp.json();
                updateMap();
                updateStats();
                loading.style.display = 'none';
            } catch (err) {
                console.error('Failed to load data:', err);
                document.getElementById('loading').innerHTML = 'Error loading data. Check API connection.';
            }
        }

        function updateMap() {
            const layer = new deck.GeoJsonLayer({
                id: 'parcels',
                data: geojsonData,
                filled: true,
                stroked: true,
                getFillColor: f => {
                    const color = TIER_COLORS[f.properties.suitability_tier] || [128, 128, 128];
                    return [...color, 180];
                },
                getLineColor: [40, 40, 40, 200],
                getLineWidth: 1,
                lineWidthMinPixels: 0.5,
                lineWidthMaxPixels: 2,
                pickable: true,
                autoHighlight: true,
                highlightColor: [255, 255, 255, 100],
            });

            const features = geojsonData.features || [];

            if (!deckgl) {
                // Initial view: show all of Casey LGA at an immersive tilt
                deckgl = new deck.DeckGL({
                    container: 'map',
                    mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                    initialViewState: {
                        longitude: 145.30,
                        latitude: -38.08,
                        zoom: 11,
                        pitch: 45,
                        bearing: -15,
                    },
                    controller: true,
                    layers: [layer],
                    getTooltip: ({object}) => {
                        if (!object || !object.properties) return null;
                        const p = object.properties;
                        return {
                            html: `
                                <b>${p.parcel_id}</b><br/>
                                Zone: ${p.zone_code || 'N/A'}<br/>
                                LGA: ${p.lga_name || 'N/A'}<br/>
                                Area: ${(p.area_sqm || 0).toFixed(0)} sqm<br/>
                                Score: <b>${p.suitability_score}</b><br/>
                                Tier: ${p.suitability_tier}<br/>
                                Neighbors: ${p.num_adjacent_parcels || 0}<br/>
                                Nearest PT: ${(p.nearest_any_pt_m || 0).toFixed(0)}m
                                ${p.is_growth_area_lga ? '<br/><span style="color:#ff9800">Growth Area LGA</span>' : ''}
                            `,
                            style: { backgroundColor: 'rgba(0,0,0,0.85)', color: 'white', fontSize: '12px', padding: '10px 14px', borderRadius: '6px' }
                        };
                    }
                });
            } else {
                deckgl.setProps({ layers: [layer] });
            }
        }

        function updateStats() {
            const panel = document.getElementById('statsPanel');
            const features = geojsonData.features || [];
            const total = features.length;
            const tiers = {};
            features.forEach(f => {
                const t = f.properties.suitability_tier;
                tiers[t] = (tiers[t] || 0) + 1;
            });
            const avgScore = total > 0
                ? (features.reduce((s, f) => s + (f.properties.suitability_score || 0), 0) / total).toFixed(1)
                : 0;
            const growthCount = features.filter(f => f.properties.is_growth_area_lga).length;

            panel.innerHTML = `
                <div class="stat-row"><span class="stat-label">Parcels shown</span><span class="stat-value">${total.toLocaleString()}</span></div>
                <div class="stat-row"><span class="stat-label">Avg score</span><span class="stat-value">${avgScore}</span></div>
                <div class="stat-row"><span class="stat-label">Growth-area</span><span class="stat-value">${growthCount.toLocaleString()}</span></div>
                ${Object.entries(tiers).sort().map(([k,v]) => `<div class="stat-row"><span class="stat-label">${k.replace('Tier ','T')}</span><span class="stat-value">${v.toLocaleString()}</span></div>`).join('')}
            `;
        }

        // Load LGA options on startup
        async function init() {
            try {
                const lgaResp = await fetch('/api/stats/lgas');
                const lgas = await lgaResp.json();
                const lgaSelect = document.getElementById('lgaFilter');
                lgas.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = l.lga_name;
                    opt.textContent = `${l.lga_name} (${l.parcel_count})${l.growth_area ? ' *' : ''}`;
                    lgaSelect.appendChild(opt);
                });
            } catch (err) {
                console.warn('Could not load LGA list:', err);
            }
            await loadData();
        }

        init();
    </script>
</body>
</html>
